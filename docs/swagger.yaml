openapi: 3.0.3
info:
  title: Mokos TTLock Passcode API
  version: 1.0.0
  description: |
    HTTP service for generating TTLock keyboard passcodes, fetching OAuth tokens,
    and hashing passwords to MD5.
servers:
  - url: http://localhost:8088
    description: Local development
tags:
  - name: Auth
    description: Authenticate and verify TTLock accounts
  - name: Passcodes
    description: Generate TTLock keyboard passcodes
  - name: Cards
    description: Manage TTLock cards
paths:
  /auth/verify-account:
    post:
      tags: [Auth]
      summary: Verify TTLock account credentials
      description: Verifies username and password by attempting TTLock password grant authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                md5:
                  type: boolean
                  description: Set true when password is already MD5 hashed
            example:
              username: "you@example.com"
              password: "5ebe2294ecd0e0f08eab7690d2a6ee69"
              md5: true
      responses:
        '200':
          description: Account verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyAccountResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /passcodes:
    post:
      tags: [Passcodes]
      summary: Generate a TTLock keyboard passcode
      description: >
        Creates a new keyboard passcode when `passcode_id` is omitted, or updates
        an existing one when `passcode_id` is provided. TTLock credentials are
        resolved from `ttlock_integrations` using `kost_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasscodeRequest'
            example:
              kost_id: "6f89a499-3018-45f0-b90f-9906f4c77cca"
              lock_id: "123456789"
              passcode: "12331242"
              passcode_id: "52877108"
              card_number: "1550390851"
              name: Tamu
              start_at: 2024-12-24T12:00:00Z
              end_at: 2024-12-25T12:00:00Z
      responses:
        '201':
          description: Passcode created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasscodeResponse'
        '400':
          description: Invalid payload (validation failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Passcodes]
      summary: Delete a TTLock keyboard passcode
      description: Deletes passcode by `passcode_id` on a lock.
      parameters:
        - in: query
          name: kost_id
          required: true
          schema:
            type: string
            format: uuid
          description: Kost ID for resolving TTLock credentials
        - in: query
          name: lock_id
          required: true
          schema:
            type: string
          description: Lock ID (numeric string)
        - in: query
          name: passcode_id
          required: true
          schema:
            type: string
          description: keyboardPwdId to delete
      responses:
        '200':
          description: Passcode deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePasscodeResponse'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /passcodes/replace:
    post:
      tags: [Passcodes]
      summary: Replace a TTLock keyboard passcode
      description: >
        If `passcode_id` is provided, deletes the existing passcode first, then
        creates a new passcode using the payload. If `passcode_id` is omitted,
        it simply creates a new passcode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasscodeRequest'
            example:
              kost_id: "6f89a499-3018-45f0-b90f-9906f4c77cca"
              lock_id: "123456789"
              passcode: "12331242"
              passcode_id: "52877108"
              card_number: "1550390851"
              name: Tamu
              start_at: 2024-12-24T12:00:00Z
              end_at: 2024-12-25T12:00:00Z
      responses:
        '201':
          description: Passcode replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasscodeResponse'
        '400':
          description: Invalid payload (validation failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /card/replace:
    post:
      tags: [Cards]
      summary: Replace TTLock card validity period
      description: >
        Updates start and end validity of an already paired card on the selected lock.
        TTLock credentials are resolved from `ttlock_integrations` using `kost_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceCardRequest'
            example:
              kost_id: "6f89a499-3018-45f0-b90f-9906f4c77cca"
              lock_id: "123456789"
              card_number: "1550390851"
              start_at: 2024-12-24T12:00:00Z
              end_at: 2024-12-25T12:00:00Z
      responses:
        '200':
          description: Card period replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceCardResponse'
        '400':
          description: Invalid payload (validation failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card number not found on lock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /cards:
    post:
      tags: [Cards]
      summary: Add a TTLock card to lock
      description: Creates a new card on lock with validity period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCardRequest'
            example:
              lock_id: "123456789"
              card_number: "1550390851"
              card_name: "Kartu Tamu"
              start_at: 2024-12-24T12:00:00Z
              end_at: 2024-12-25T12:00:00Z
      responses:
        '201':
          description: Card created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddCardResponse'
        '400':
          description: Invalid payload (validation failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Cards]
      summary: Delete a TTLock card from lock
      parameters:
        - in: query
          name: kost_id
          required: true
          schema:
            type: string
            format: uuid
          description: Kost ID for resolving TTLock credentials
        - in: query
          name: lock_id
          required: true
          schema:
            type: string
          description: Lock ID (numeric string)
        - in: query
          name: card_number
          required: true
          schema:
            type: string
          description: Card number on lock
      responses:
        '200':
          description: Card deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCardResponse'
        '400':
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card number not found on lock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TTLock error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PasscodeRequest:
      type: object
      required: [kost_id, lock_id, passcode, start_at, end_at]
      properties:
        kost_id:
          type: string
          format: uuid
          description: Kost ID for resolving active TTLock integration
        lock_id:
          type: string
          description: Lock ID (numeric string)
        passcode:
          type: string
          description: Plain keyboard passcode to set (not randomly generated by server)
        passcode_id:
          type: string
          description: Existing TTLock keyboardPwdId to update; omit to create new passcode
        card_number:
          type: string
          description: Optional IC card number; when provided, service updates card validity period (start/end) on TTLock
        name:
          type: string
          description: Friendly label for the passcode; defaults to "Passcode"
        start_at:
          type: string
          format: date-time
          description: Start time in RFC3339 (UTC recommended)
        end_at:
          type: string
          format: date-time
          description: End time in RFC3339; must be after `start_at`
    PasscodeResponse:
      type: object
      properties:
        passcode_id:
          type: integer
          format: int64
          description: keyboardPwdId returned by TTLock API
        passcode:
          type: string
        start_at:
          type: integer
          format: int64
          description: Start time in milliseconds since epoch
        end_at:
          type: integer
          format: int64
          description: End time in milliseconds since epoch
    ReplaceCardRequest:
      type: object
      required: [kost_id, lock_id, card_number, start_at, end_at]
      properties:
        kost_id:
          type: string
          format: uuid
          description: Kost ID for resolving active TTLock integration
        lock_id:
          type: string
          description: Lock ID (numeric string)
        card_number:
          type: string
          description: Card number already paired on TTLock lock
        start_at:
          type: string
          format: date-time
          description: Start time in RFC3339 (UTC recommended)
        end_at:
          type: string
          format: date-time
          description: End time in RFC3339; must be after `start_at`
    ReplaceCardResponse:
      type: object
      properties:
        lock_id:
          type: integer
          format: int64
        card_number:
          type: string
        start_at:
          type: integer
          format: int64
          description: Start time in milliseconds since epoch
        end_at:
          type: integer
          format: int64
          description: End time in milliseconds since epoch
    AddCardRequest:
      type: object
      required: [lock_id, card_number, start_at, end_at]
      properties:
        lock_id:
          type: string
          description: Lock ID (numeric string)
        card_number:
          type: string
          description: Card number to pair on lock
        card_name:
          type: string
          description: Optional card label
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
    AddCardResponse:
      type: object
      properties:
        created:
          type: boolean
        lock_id:
          type: integer
          format: int64
        card_id:
          type: integer
          format: int64
        card_number:
          type: string
        card_name:
          type: string
        start_at:
          type: integer
          format: int64
        end_at:
          type: integer
          format: int64
    DeleteCardResponse:
      type: object
      properties:
        deleted:
          type: boolean
        kost_id:
          type: string
          format: uuid
        lock_id:
          type: integer
          format: int64
        card_id:
          type: integer
          format: int64
        card_number:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    DeletePasscodeResponse:
      type: object
      properties:
        deleted:
          type: boolean
        kost_id:
          type: string
          format: uuid
        lock_id:
          type: integer
          format: int64
        passcode_id:
          type: integer
          format: int64
    VerifyAccountResponse:
      type: object
      properties:
        verified:
          type: boolean
        message:
          type: string
